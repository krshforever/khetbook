name: Build Android APK

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build web (Vite → dist)
        run: |
          set -e
          npm run build
          node scripts/prerender.js
          if [ ! -f "dist/index.html" ]; then
            echo "::error::dist/index.html missing after prerender"
            ls -la dist
            exit 1
          fi
          echo "dist/ ready:"
          ls -la dist | head -20

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate app icons & splash from resources/icon.png
        run: |
          npm install --no-save @capacitor/assets
          npx capacitor-assets generate --android || true

      - name: Sync Capacitor (copy web assets + plugins)
        run: |
          npx cap copy android
          npx cap update android
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK to khetbook.apk
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/khetbook.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: khetbook-apk
          path: android/app/build/outputs/apk/debug/khetbook.apk

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/khetbook.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
